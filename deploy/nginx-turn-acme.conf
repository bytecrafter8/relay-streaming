# Nginx is used only for the ACME HTTP-01 challenge for the TURN certificate.
# TURN itself is served directly by coturn on 3478 and 5349; it is not proxied
# through this HTTP server block.
server {
    listen 80;
    listen [::]:80;
    server_name turn.asynchronous-inc.org;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
